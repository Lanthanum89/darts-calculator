<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Darts Checkout Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Suggests optimal darts checkout finishes for any score from 2 to 170.">

  <meta name="theme-color" content="#3b82f6">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Darts Checkout">
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="badge" aria-hidden="true"></div>
      <h1>Darts Checkout Helper</h1>
    </div>
    <div class="subtitle">
      Enter a score between 2 and 170, then tap suggest or hit Enter.
    </div>

    <label for="scoreInput">Score</label>
    <div class="input-row">
      <input type="number" id="scoreInput" min="0" max="500" inputmode="numeric" placeholder="e.g. 170">
      <button class="suggest-button" id="suggestButton" type="button">Suggest</button>
    </div>

    <div class="keypad" id="keypad">
      <button type="button" data-digit="1">1</button>
      <button type="button" data-digit="2">2</button>
      <button type="button" data-digit="3">3</button>
      <button type="button" data-digit="4">4</button>
      <button type="button" data-digit="5">5</button>
      <button type="button" data-digit="6">6</button>
      <button type="button" data-digit="7">7</button>
      <button type="button" data-digit="8">8</button>
      <button type="button" data-digit="9">9</button>
      <button type="button" class="key-clear" data-action="clear">Clear</button>
      <button type="button" data-digit="0">0</button>
      <button type="button" class="key-backspace" data-action="backspace">⌫</button>
    </div>

    <div class="result" id="resultBox">
      <div class="result-message">Enter a score to get a suggestion.</div>
    </div>

    <div class="recent" id="recentSection" style="display: none;">
      <div class="recent-label">Recent lookups</div>
      <div class="recent-list" id="recentList"></div>
    </div>

    <div class="hint">
      Example checkouts, 170 → T20 . T20 . DBULL, 167 → T20 . T19 . DBULL.
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
