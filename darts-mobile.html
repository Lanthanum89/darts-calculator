<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Darts Checkout Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 1rem;
    }

    .card {
      background: #111827;
      border-radius: 16px;
      padding: 1.25rem 1.25rem 1.5rem;
      width: 100%;
      max-width: 480px;
      margin: auto;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #9ca3af;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    input[type="number"] {
      flex: 1;
      padding: 0.7rem 0.75rem;
      border-radius: 999px;
      border: 1px solid #374151;
      background: #020617;
      color: #f9fafb;
      font-size: 1rem;
      appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 1px #3b82f6;
    }

    button {
      padding: 0.7rem 1rem;
      border-radius: 999px;
      border: none;
      background: #3b82f6;
      color: #f9fafb;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(1px);
    }

    button:focus {
      outline: none;
      box-shadow: 0 0 0 2px #60a5fa;
    }

    .result {
      margin-top: 1.2rem;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      background: #020617;
      border: 1px solid #4b5563;
      font-size: 1rem;
      min-height: 2.6rem;
      display: flex;
      align-items: center;
    }

    .hint {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.6rem;
      line-height: 1.4;
    }

    /* Slightly bigger spacing on small screens */
    @media (max-width: 480px) {
      .card {
        padding: 1.1rem 1rem 1.4rem;
        border-radius: 14px;
      }

      h1 {
        font-size: 1.35rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }

      button {
        font-size: 0.9rem;
        padding-inline: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Darts Checkout Helper</h1>
    <div class="subtitle">
      Enter a score between 2 and 170, then tap suggest or hit Enter.
    </div>

    <label for="scoreInput">Score</label>
    <div class="input-row">
      <input type="number" id="scoreInput" min="0" max="500" inputmode="numeric" placeholder="e.g. 170">
      <button id="suggestButton">Suggest</button>
    </div>

    <div class="result" id="resultBox">
      Enter a score to get a suggestion.
    </div>

    <div class="hint">
      Example checkouts, 170 → T20 . T20 . DBULL, 167 → T20 . T19 . DBULL.
    </div>
  </div>

  <script>
    // ========== Darts logic ==========

    function generateDartOptions() {
      const darts = [];

      for (let n = 1; n <= 20; n++) {
        darts.push({ name: "S" + n, value: n });
      }

      darts.push({ name: "SBULL", value: 25 });

      for (let n = 1; n <= 20; n++) {
        darts.push({ name: "D" + n, value: 2 * n });
      }

      darts.push({ name: "DBULL", value: 50 });

      for (let n = 1; n <= 20; n++) {
        darts.push({ name: "T" + n, value: 3 * n });
      }

      darts.sort((a, b) => b.value - a.value);
      return darts;
    }

    const ALL_DARTS = generateDartOptions();

    function isDouble(dart) {
      return dart.name.startsWith("D") || dart.name === "DBULL" || dart.value === 50;
    }

    function oneDartFinish(score) {
      for (const dart of ALL_DARTS) {
        if (dart.value === score && isDouble(dart)) {
          return [dart];
        }
      }
      return null;
    }

    function twoDartFinish(score) {
      for (const first of ALL_DARTS) {
        const remaining = score - first.value;
        if (remaining <= 1) continue;
        const last = oneDartFinish(remaining);
        if (last) return [first].concat(last);
      }
      return null;
    }

    function threeDartFinish(score) {
      for (const first of ALL_DARTS) {
        const remAfterFirst = score - first.value;
        if (remAfterFirst <= 1) continue;

        for (const second of ALL_DARTS) {
          const remAfterSecond = remAfterFirst - second.value;
          if (remAfterSecond <= 1) continue;

          const last = oneDartFinish(remAfterSecond);
          if (last) return [first, second].concat(last);
        }
      }
      return null;
    }

    function suggestCheckout(score) {
      if (score < 2 || score > 170) return null;
      const fns = [oneDartFinish, twoDartFinish, threeDartFinish];
      for (const fn of fns) {
        const res = fn(score);
        if (res) return res;
      }
      return null;
    }

    function formatCheckout(checkout) {
      const parts = checkout.map(d => d.name);
      const total = checkout.reduce((sum, d) => sum + d.value, 0);
      return parts.join(" . ") + "  (total " + total + ")";
    }

    // ========== UI wiring ==========

    const scoreInput = document.getElementById("scoreInput");
    const suggestButton = document.getElementById("suggestButton");
    const resultBox = document.getElementById("resultBox");

    function showMessage(msg) {
      resultBox.textContent = msg;
    }

    function handleSuggest() {
      const raw = scoreInput.value.trim();

      if (!raw) {
        showMessage("Please enter a score.");
        return;
      }

      const score = Number(raw);

      if (!Number.isInteger(score) || Number.isNaN(score)) {
        showMessage("Please enter a whole number like 40 or 170.");
        return;
      }

      const suggestion = suggestCheckout(score);

      if (!suggestion) {
        if (score <= 1) {
          showMessage("You cannot finish from this score, you should never be on 1.");
        } else if (score > 170) {
          showMessage("No standard 3 dart checkout above 170.");
        } else {
          showMessage("No standard checkout found, set up a better finish.");
        }
      } else {
        showMessage(formatCheckout(suggestion));
      }
    }

    suggestButton.addEventListener("click", handleSuggest);

    scoreInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        handleSuggest();
      }
    });

    // Focus input on load for quick use
    window.addEventListener("load", () => {
      scoreInput.focus();
    });
  </script>
</body>
</html>
